server.port=3000

spring.application.name=agroai-backend-spring

management.endpoints.web.exposure.include=health,info

app.node-env=development
app.jwt-secret=replace_with_a_strong_secret
app.jwt-expiration-hours=24
app.frontend-url=http://localhost:5173
app.mock-mode=false
app.gemini-api-key=replace_with_your_gemini_api_key
app.weather-api-key=replace_with_your_weather_api_key
app.thingspeak.channel-id=3314379
app.thingspeak.read-api-key=replace_with_your_thingspeak_read_key
app.thingspeak.write-api-key=replace_with_your_thingspeak_write_key
app.ml-model.url=https://crop-disease-70gb.onrender.com/predict
app.ml-model.fallback-urls[0]=https://croppredictor-hqfk.onrender.com/predict
app.ml-model.fallback-urls[1]=https://crop-disease-api.onrender.com/predict
logging.level.org.springframework.security=INFO
