server.port=${PORT:3000}

spring.application.name=agroai-backend-spring
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/agroai}

management.endpoints.web.exposure.include=health,info

app.node-env=${NODE_ENV:development}
app.jwt-secret=${JWT_SECRET:secret}
app.jwt-expiration-hours=24
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.mock-mode=${MOCK_MODE:false}
app.gemini-api-key=${GEMINI_API_KEY:}
app.weather-api-key=${WEATHER_API_KEY:}
app.thingspeak.channel-id=${THINGSPEAK_CHANNEL_ID:3314379}
app.thingspeak.read-api-key=${THINGSPEAK_READ_API_KEY:}
app.thingspeak.write-api-key=${THINGSPEAK_WRITE_API_KEY:}
app.ml-model.url=https://crop-disease-70gb.onrender.com/predict
app.ml-model.fallback-urls[0]=https://croppredictor-hqfk.onrender.com/predict
app.ml-model.fallback-urls[1]=https://crop-disease-api.onrender.com/predict
logging.level.org.springframework.security=INFO
